<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOMEBOUND — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ultra&family=Crimson+Text:ital,wght@0,400;1,400&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(ellipse at 50% 40%, #9E1010 0%, #6B0808 45%, #3D0303 100%);
      color: #F7F2EC;
      font-family: 'Crimson Text', Georgia, serif;
      padding: 40px 24px;
    }
    h1 {
      font-family: 'Ultra', Georgia, serif;
      font-size: clamp(48px, 10vw, 100px);
      line-height: 0.9;
      margin-bottom: 24px;
    }
    p {
      font-size: clamp(18px, 2vw, 24px);
      color: rgba(247,242,236,0.7);
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 48px;
    }
    .rule {
      width: 40px;
      height: 1px;
      background: rgba(247,242,236,0.3);
      margin: 0 auto 48px;
    }
    a {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #1A0A0A;
      background: #F7F2EC;
      text-decoration: none;
      padding: 14px 36px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
    .sub {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(247,242,236,0.35);
      margin-top: 32px;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <h1>HOMEBOUND</h1>
  <div class="rule"></div>
  <p>You're on the list.<br><em>See you at the show.</em></p>
  <a href="/">Back to the site</a>
  <p class="sub">Book, Music &amp; Lyrics by Zach Adam</p>
</body>
</html>
